{% extends "base.html" %}
{% block title %}Sign Up - SmartMeds{% endblock %}
{% block content %}
<div style="max-width:500px; margin:2rem auto;">
    <div class="card">
        <div class="card-header" style="text-align:center;">📝 Create Your Account</div>
        <form method="POST">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" class="form-control" required placeholder="John Doe">
            </div>
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" class="form-control" required placeholder="john123">
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="password-field">
                    <input type="password" name="password" id="signupPassword" class="form-control" required placeholder="Min 6 characters">
                    <button type="button" class="password-toggle" onclick="togglePassword('signupPassword', this)">
                        👁️
                    </button>
                </div>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" class="form-control" required placeholder="john@example.com">
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" name="phone" class="form-control" required placeholder="+91 9876543210">
            </div>
            <div class="form-group">
                <label>Address</label>
                <textarea name="address" class="form-control" rows="2" required placeholder="123, Main Street, City"></textarea>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">Create Account</button>
        </form>
        <p style="text-align:center; margin-top:1rem;">
            Already registered? <a href="/login" style="color:var(--accent);">Login here</a>
        </p>
    </div>
</div>
{% endblock %}
