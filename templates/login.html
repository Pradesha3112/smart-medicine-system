{% extends "base.html" %}
{% block title %}Login - SmartMeds{% endblock %}
{% block content %}
<div style="max-width:450px; margin:2rem auto;">
    <div class="card">
        <div class="card-header" style="text-align:center;">🔐 Login</div>
        <form method="POST">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" class="form-control" required placeholder="Enter username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="password-field">
                    <input type="password" name="password" id="loginPassword" class="form-control" required placeholder="Enter password">
                    <button type="button" class="password-toggle" onclick="togglePassword('loginPassword', this)">
                        👁️
                    </button>
                </div>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">Login</button>
        </form>
        <p style="text-align:center; margin-top:1rem;">
            Don't have an account? <a href="/signup" style="color:var(--accent);">Sign up</a>
        </p>
        <p style="text-align:center; margin-top:0.5rem; font-size:0.9rem; color:var(--text-secondary);">
            Demo: admin / admin123
        </p>
    </div>
</div>
{% endblock %}
