{% extends "base.html" %}
{% block title %}Edit Profile - SmartMeds{% endblock %}
{% block content %}

<div style="max-width:500px; margin:2rem auto;">
    <div class="card">
        <div class="card-header" style="text-align:center;">✏️ Edit Profile</div>
        <form method="POST">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" class="form-control" value="{{ user.name }}" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" class="form-control" value="{{ user.email or '' }}">
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input type="text" name="phone" class="form-control" value="{{ user.phone or '' }}">
            </div>
            <div class="form-group">
                <label>Address</label>
                <textarea name="address" class="form-control" rows="2">{{ user.address or '' }}</textarea>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">💾 Save Changes</button>
        </form>
        <div style="text-align:center; margin-top:1rem;">
            <a href="/profile" class="btn btn-outline btn-sm">← Back to Profile</a>
        </div>
    </div>
</div>

{% endblock %}
