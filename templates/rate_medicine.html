{% extends "base.html" %}
{% block title %}Rate Medicine - SmartMeds{% endblock %}
{% block content %}

<div style="max-width:500px; margin:2rem auto;">
    <div class="card">
        <div class="card-header" style="text-align:center;">⭐ Rate Your Medicine</div>
        
        <div style="text-align:center; margin-bottom:1.5rem;">
            <h3>{{ order.medicine_name }}</h3>
            <p style="color:var(--text-secondary);">Order #{{ order.id }} | Qty: {{ order.quantity }}</p>
        </div>
        
        <form method="POST" id="ratingForm">
            <!-- Star Rating -->
            <div class="form-group" style="text-align:center;">
                <label>Your Rating</label>
                <div class="star-rating" style="justify-content:center; font-size:2rem;">
                    {% for i in range(5) %}
                    <span class="star {% if existing and i < existing.rating %}active{% endif %}" 
                          data-rating="{{ i + 1 }}">★</span>
                    {% endfor %}
                </div>
                <input type="hidden" name="rating" id="ratingInput" value="{{ existing.rating if existing else 0 }}" required>
            </div>
            
            <!-- Comment -->
            <div class="form-group">
                <label>Your Review (Optional)</label>
                <textarea name="comment" class="form-control" rows="3" 
                          placeholder="Share your experience with this medicine...">{{ existing.comment if existing else '' }}</textarea>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width:100%;">
                {% if existing %}✏️ Update Rating{% else %}⭐ Submit Rating{% endif %}
            </button>
        </form>
        
        <div style="text-align:center; margin-top:1rem;">
            <a href="/user/profile" class="btn btn-outline btn-sm">← Back to Profile</a>
        </div>
    </div>
</div>

{% endblock %}
